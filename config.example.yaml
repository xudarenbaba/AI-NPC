use_rag: true
use_consolidation: true

llm:
  provider: openai_compatible
  model: deepseek-chat
  api_key: "YOUR_API_KEY_HERE"
  base_url: https://api.deepseek.com
  temperature: 0.2
  timeout_s: 60

embeddings:
  provider: huggingface
  model: BAAI/bge-small-zh-v1.5
  cache_dir: models
  # 已下载模型且不想联网时改为 true；否则会向 Hugging Face 校验元数据，超时即 WinError 10060
  local_files_only: false

vectorstore:
  persist_dir: data/chroma
  collection_name: memory

memory:
  short_term_turns: 10
  k_world: 3
  k_persona: 3
  k_dialogue: 5
  dialogue_store_min_chars: 6

mcp:
  enabled: true
  command: null
  args: null
